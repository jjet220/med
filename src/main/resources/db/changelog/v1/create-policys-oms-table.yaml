databaseChangeLog:
  - changeSet:
      id: 2
      author: daniil
      changes:
        - createTable:
            tableName: policys
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: bigint
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: date_and_time_of_creation
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: single_policy_number
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: policys
            baseColumnNames: patient_id
            referencedTableName: patients
            referencedColumnNames: id
            constraintName: fk_policy_patient
            onDelete: CASCADE